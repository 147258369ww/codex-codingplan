# codex-proxy/config.example.yaml
# Copy this file to config.yaml and fill in your values

server:
  host: "127.0.0.1"
  port: 8080

coding_plan:
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key: "${CODING_PLAN_API_KEY}"  # Set via environment variable
  model: "qwen3.5-plus"
  timeout: 300
  model_mapping:
    # Map Codex model names to Coding Plan models
    "gpt-5.4": "qwen3.5-plus"
    "gpt-5": "qwen3.5-plus"
    "gpt-4.1": "qwen3.5-plus"
    "o4-mini": "qwen3.5-plus"

logging:
  # Legacy shared log level fallback for code paths that still use a single level.
  level: "INFO"
  # Console summary level for the upcoming split logging path.
  console_level: "INFO"
  # File diagnostic level for the upcoming split logging path.
  file_level: "DEBUG"
  # Maximum payload text kept before truncation markers are added.
  payload_max_chars: 4000
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
